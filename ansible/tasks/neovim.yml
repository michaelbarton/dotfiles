---
- name: Create virtual environment
  ansible.builtin.pip:
    virtualenv: "{{ venv_path }}/nvim"
    virtualenv_command: "python{{ python_version }} -m venv"
    name:
      - codespell
      - dap-python
      - debugpy
      - isort
      - mdformat
      - neovim
      - pynvim
      - ruff
      - yamllint

- name: Remove existing directories that need to be replaced with symlinks
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/nvim/{{ item }}"
    state: absent
  loop:
    - ftplugin
    - dbt

- name: Link specific configuration files
  ansible.builtin.file:
    src: "{{ playbook_dir }}/../{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
    state: link
  loop:
    - { src: "nvim/init.lua", dest: ".config/nvim/init.lua" }
    - { src: "nvim/lua", dest: ".config/nvim/lua" }
    - { src: "nvim/ftplugin", dest: ".config/nvim/ftplugin" }
    - { src: "dbt", dest: ".config/nvim/dbt" }

- name: Install jsonlint node.js package
  ansible.builtin.command:
    argv:
      - npm
      - install
      - --prefix
      - "{{ venv_path }}/nvim"
      - jsonlint

- name: Run Lazy sync for Neovim plugins
  ansible.builtin.command:
    argv:
      - nvim
      - --headless
      - "+Lazy! sync"
      - "+qa"
  tags:
    - nvim

- name: Clean unused Lazy plugins
  ansible.builtin.command:
    argv:
      - nvim
      - --headless
      - "+Lazy! clean"
      - "+qa"
  tags:
    - nvim

- name: Update treesitter parsers
  ansible.builtin.command:
    argv:
      - nvim
      - --headless
      - "+TSUpdateSync"
      - "+qa"
  tags:
    - nvim
