#{{{1 GENERAL OPTIONS

set-option -g default-shell "/opt/homebrew/bin/fish"
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-ghostty:Tc"
set-option -g history-limit 100000
set-option -g focus-events on
set-option -g escape-time 0
set-option -g mouse on
# Kitty keyboard protocol: distinguishes Ctrl+I from Tab, Ctrl+M from Enter
set -g extended-keys on
# Pass OSC sequences through to terminal (needed for yazi images, delta hyperlinks, OSC52)
set -g allow-passthrough all
# OSC52 clipboard: nvim clipboard operations work through tmux into Ghostty
set -g set-clipboard on

#{{{1 KEY BINDS

#{{{2 UNBINDS

unbind C-b
unbind l
unbind h
unbind k
unbind j
unbind u
unbind i
unbind Space

#{{{2 GENERAL

set -g prefix C-a
bind-key a send-prefix
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."
bind Space copy-mode
set-window-option -g mode-keys vi

#{{{2 WINDOWS

bind-key C-a last-window
bind -n M-h previous-window
bind -n M-l next-window

#{{{2 PANES

# Splits
bind u split-window -v -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"

# Vim-tmux-navigator handles C-h/j/k/l pane switching
# See: https://github.com/christoomey/vim-tmux-navigator

#{{{1 WINDOW SETTINGS

set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on
set-window-option -g automatic-rename on
set-option -g allow-rename off
set -g set-titles on

#{{{1 PLUGINS (TPM)

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

#{{{2 CATPPUCCIN

set -g @catppuccin_flavor 'frappe'

#{{{1 INITIALIZE TPM
# (keep this line at the very bottom of tmux.conf)

run '~/.tmux/plugins/tpm/tpm'
